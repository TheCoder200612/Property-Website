<!doctype html>
<html>
  <head>
    <title>Property Congo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="CSS-Styles/general.css" />
    <link rel="stylesheet" href="CSS-Styles/header.css" />
    <link rel="stylesheet" href="CSS-Styles/hero.css" />
  </head>

  <body>
    <!--Header-->
    <div class="header">
      <!--Left Section-->
      <div class="left-section">
        <img
          class="website-logo"
          src="Images/Property_Congo__1_-removebg-preview.png"
          alt="main backgroundS"
        />
      </div>

      <!--Right Section-->
      <div class="right-section">
        <!--Main navigation-->
        <div class="main-nav">
          <button>Buy</button>
          <button>Sell</button>
          <button>Rent</button>
          <button>Advice</button>
          <button>Services</button>
        </div>

        <!--Account Authentication-->
        <div class="auth-actions">
          <button class="login-button">Login</button>
          <button class="signup-button">Sign Up</button>
        </div>
      </div>
    </div>

    <!--Hero Section-->
    <div class="hero">
      <!--Hero Title-->
      <p class="hero-title">Invest in Congo.</p>

      <!--Hero Search-->
      <div class="hero-search-section">
        <!--Buy and Sell Buttons-->
        <div class="buy-and-sell-section">
          <button class="buy-btn">Buy</button>
          <button class="sell-btn">Sell</button>
        </div>

        <!--Search Box-->
        <div class="search-box-section">
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-search"
            viewBox="0 0 16 16"
          >
            <path
              d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"
            />
          </svg>

          <!--Search box-->
          <input
            class="search-box"
            type="text"
            placeholder="Search city, suburb or area"
          />

          <!--Search Button-->
          <button class="search-button">Search</button>
        </div>
      </div>

      <!--Filters-->
      <div class="filters">
        <button>Property Type</button>
        <button>Min Price</button>
        <button>Max Price</button>
        <button>More Filters +</button>
      </div>
    </div>

    <!---->
    <div></div>
  </body>
</html>
